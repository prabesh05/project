<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Website</title>

    <link rel="stylesheet" href="style.css">


    <!--adding google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

</head>

<body>
   <!--sidebar-->
   <div class="sidebar">
    <!--logo-->
    <h1 class="logo">Hungry Hoppers</h1>


    <!--list of menus-->
    <div class="sidebar-menus">
        <a href="#"><ion-icon name="storefront-outline"></ion-icon>Home </a>
        <a href="#"><ion-icon name="receipt-outline"></ion-icon>Bills </a>
        <a href="#"> <ion-icon name="wallet-outline"></ion-icon>Wallet  </a>
        <a href="#"> <ion-icon name="notifications-outline"></ion-icon>Notifications </a>
        <a href="#"> <ion-icon name="chatbubbles-outline"></ion-icon>Contact Us  </a>
        <a href="#"><ion-icon name="settings-outline"></ion-icon>Settings </a> 


    </div>
    <!--logout-->
    <div class="sidebar-logout">
        <a href="login.html"><ion-icon name="log-out-outline"></ion-icon>Logout</a>

        
    </div>

   </div>

   <!--main-->
   <div class="main">  
   <!--main navbar-->
<div class="main-navbar">

<!--menu when appear on mobile version-->
<ion-icon class="menu-toggle" name="menu-outline"></ion-icon>

<!--search bar -->
<div class="search">
    <input type="text" placeholder="What you want to eat??">
    <button class="search-btn">Search</button>

</div>

<!--profile icon on left side of navbar-->
<div class="profile">
    <a class="cart" href="#"><ion-icon name="cart-outline"></ion-icon></a>

    <a class="user" href="#"><ion-icon name="person-outline"></ion-icon>  </a>
</div>

</div>   

   <!--main highlight -->

   <div class="main-highlight">
    <!--title section and arrow-->
    <div class="main-header">
        <h2 class="main-title">Recommendations</h2>
        <div class="main-arrow">
            <ion-icon class="back" name="chevron-back-circle-outline"></ion-icon>
            <ion-icon class="next" name="chevron-forward-circle-outline"></ion-icon>

        </div>
    </div>
    <!--highlight menu-->
<div class="highlight-wrapper">
    <div class="highlight-card">
        <img class="highlight-img" src="images/salad.jpg">  
        <div class="highlight-desc">
            <h4>Fresh Salad</h4>
            <p>Rs.450</p>
        </div>
    </div>

    <div class="highlight-card">
        <img class="highlight-img" src="images/coffee.jpg">
        <div class="highlight-desc">
            <h4>Coffee</h4>
            <p>Rs.320</p>
        </div>
    </div>

    <div class="highlight-card">
        <img class="highlight-img" src="images/momo.jpg">
        <div class="highlight-desc">
            <h4>Momo</h4>
            <p>Rs.280</p>
        </div>
    </div>

    <div class="highlight-card">
        <img class="highlight-img" src="images/burger.jpg">
        <div class="highlight-desc">
            <h4>Burger</h4>
            <p>Rs.350</p>
        </div>
    </div>
</div>

   <!--main menus/order-->
    <div class="main-menus">

        <!--filter section-->
        
        <div class="main-filter">
            <div>
                <h2 class="main-title">Menu <br>Category</h2>
                <div class="main-arrow">
                <ion-icon class="back-menus" name="chevron-back-circle-outline"></ion-icon>
                <ion-icon class="next-menus" name="chevron-forward-circle-outline"></ion-icon>
            </div>
        </div>
        <div class="filter-wrapper">
            <div class="filter-card">
                <div class="filter-icon">
                    <ion-icon name="restaurant-outline"></ion-icon>

                </div>
                <p>All Menus</p>
            </div>
            <div class="filter-card">
                <div class="filter-icon">
                    <ion-icon name="fast-food-outline"></ion-icon>

                </div>
                <p>Burger</p>
            </div>
            <div class="filter-card">
                <div class="filter-icon">
                    <ion-icon name="pizza-outline"></ion-icon>

                </div>
                <p>Pizza</p>
            </div>
            <div class="filter-card">
                <div class="filter-icon">
                    <ion-icon name="wine-outline"></ion-icon>

                </div>
                <p>Wine</p>
            </div>
            <div class="filter-card">
                <div class="filter-icon">
                    <ion-icon name="ice-cream-outline"></ion-icon>
                </div>
                <p>Ice-cream</p>
            </div>
            <div class="filter-card">
                <div class="filter-icon">
                    <ion-icon name="cafe-outline"></ion-icon>
                </div>
                <p>Coffee</p>
            </div>
            <div class="filter-card">
                <div class="filter-icon">
                    <ion-icon name="fish"></ion-icon>
                </div>
                <p>Sea Food</p>
            </div>
            <div class="filter-card">
                <div class="filter-icon">
                    <ion-icon name="nutrition-outline"></ion-icon>
                </div>
                <p>Healthy</p>
            </div>
        </div>
        </div>

        <!--list of foods-->

    </div>
    


</div>



    <!--adding ion icon -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>


</body>
</html>
